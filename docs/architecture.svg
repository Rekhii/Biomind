<text class="step" x="580" y="690">8</text>
<path d="M550 674 L560 723" class="arr-ctrl" marker-end="url(#ah-ctrl)"/>
<text class="lbl" x="510" y="700">RPE = R - Q</text>
<text class="lbl" x="510" y="712">DA = RPE x 80</text>

<text class="step" x="350" y="770">9</text>
<path d="M505 750 L260 800" class="arr-da" marker-end="url(#ah-da)"/>
<text class="lbl" x="350" y="760">Inject DA phasic</text>

<path d="M190 834 L190 870 L350 900" class="arr-ctrl" marker-end="url(#ah-ctrl)"/>
