<text class="step" x="580" y="590">7</text>
<path d="M560 164 L560 460" class="arr-ctrl" marker-end="url(#ah-ctrl)"/>

<path d="M550 514 L550 618" class="arr-ctrl" marker-end="url(#ah-ctrl)"/>
